services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["6100:6100"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app
      PORT: "6100"
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6100/healthz"]
      interval: 10s
      retries: 5

  frontend:
    build: ./frontend
    ports: ["8100:8100"]
    environment:
      BACKEND_URL: http://backend:6100
      PORT: "8100"
    depends_on:
      backend: { condition: service_healthy }

volumes:
  pgdata:
